# ??? DATABASE CONNECTION ???????????????????????????????????????????
# jdbc:postgresql://  ?  protocol (tells Java to use PostgreSQL driver)
# localhost           ?  where PostgreSQL is running (your own machine)
# 5432                ?  default PostgreSQL port
# userdb              ?  the database name you created in PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/userdb

# Your PostgreSQL login credentials
spring.datasource.username=postgres
spring.datasource.password=root


# Tells Spring which JDBC driver class to use for PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# ??? JPA / HIBERNATE ???????????????????????????????????????????????
# update  ? auto creates/updates tables based on your @Entity classes
# create  ? drops and recreates tables every restart (use only in dev)
# none    ? do nothing (use in production)
spring.jpa.hibernate.ddl-auto=update

# Shows the actual SQL queries in your console (great for learning!)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Tells Hibernate you are using PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ??? APP PORT (optional) ???????????????????????????????????????????
server.port=8080
